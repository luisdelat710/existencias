<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Existencias — Pisos y Azulejos Acosta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f0f0f0;min-height:100vh;padding:18px 14px;display:flex;flex-direction:column;align-items:center}
img.logo{max-width:200px;width:80%;margin-bottom:14px}
input.q{width:100%;max-width:460px;padding:13px 16px;border:2px solid #ddd;border-radius:10px;font-size:16px;outline:none;margin-bottom:14px;background:#fff}
input.q:focus{border-color:#E87722}
.card{background:#fff;border-radius:16px;padding:24px 20px;max-width:460px;width:100%;box-shadow:0 6px 28px rgba(0,0,0,.1);text-align:center}
.tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.4px}
.tag-p{background:#e3f0ff;color:#1565c0}
.tag-m{background:#fce4ec;color:#c62828}
.tag-fmt{background:#fff3e0;color:#E87722}
.tag-promo{background:#f3e5f5;color:#6a1b9a;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.nom{font-size:16px;font-weight:800;color:#1a1a1a;margin-bottom:16px;line-height:1.4}
.bar{height:5px;background:linear-gradient(90deg,#E87722,#ffb870);border-radius:3px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:#f8f8f8;border-radius:10px;padding:12px 8px}
.stat .lbl{font-size:10px;color:#aaa;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.stat .val{font-size:26px;font-weight:900;color:#E87722;line-height:1}
.stat .uni{font-size:10px;color:#bbb;margin-top:2px}
.stat.precio-box .val{font-size:22px;color:#1a1a1a}
.promo-banner{background:linear-gradient(135deg,#6a1b9a,#ab47bc);color:#fff;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:800;letter-spacing:.3px}
.fec{font-size:11px;color:#ccc;margin-top:4px}
.vacio{color:#ccc;font-size:15px;padding:10px 0;line-height:1.8}
</style>
</head>

const F="martes, 14 de abril de 2026";
function fmt(n){return new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:2}).format(n);}
function show(p){
  var c=document.getElementById("card");
  if(!p){c.innerHTML="<p class=\"vacio\">Producto no encontrado</p>";return;}
  var tagCat=p.categoria==="PISO"?"<span class=\"tag tag-p\">PISO<\/span>":"<span class=\"tag tag-m\">MURO<\/span>";
  var tagFmt=p.formato?"<span class=\"tag tag-fmt\">"+p.formato+"<\/span>":"";
  var promoBanner=p.promo?"<div class=\"promo-banner\">🏷 PRODUCTO EN PROMOCIÓN<\/div>":"";
  var precioBox=p.precio>0
    ?"<div class=\"stat precio-box\"><div class=\"lbl\">Precio<\/div><div class=\"val\">"+fmt(p.precio)+"<\/div><div class=\"uni\">por m²<\/div><\/div>"
    :"<div class=\"stat\"><div class=\"lbl\">Precio<\/div><div class=\"val\" style=\"font-size:14px;color:#ccc\">—<\/div><\/div>";
  var m2box=p.m2total!=null
    ?"<div class=\"stat\"><div class=\"lbl\">M² totales<\/div><div class=\"val\">"+p.m2total.toFixed(1)+"<\/div><div class=\"uni\">m²<\/div><\/div>"
    :"<div class=\"stat\"><div class=\"lbl\">M² totales<\/div><div class=\"val\" style=\"font-size:14px;color:#ccc\">—<\/div><\/div>";
  c.innerHTML=
    "<div class=\"tags\">"+tagCat+tagFmt+"<\/div>"+
    "<div class=\"nom\">"+p.nombre+"<\/div>"+
    promoBanner+
    "<div class=\"bar\"><\/div>"+
    "<div class=\"grid3\">"+
      precioBox+
      "<div class=\"stat\"><div class=\"lbl\">Existencia<\/div><div class=\"val\">"+p.existencia+"<\/div><div class=\"uni\">cajas<\/div><\/div>"+
      m2box+
    "<\/div>"+
    "<div class=\"fec\">Actualizado: "+F+"<\/div>";
}
function bus(q){
  var k=q.trim().toUpperCase();if(!k)return;
  var p=D[k];
  if(!p){var ks=Object.keys(D);var f=ks.find(function(x){return x.toUpperCase().startsWith(k);});if(!f)f=ks.find(function(x){return x.toUpperCase().includes(k);});p=f?D[f]:null;}
  show(p);
}
function init(){
  var h=decodeURIComponent(location.hash.replace("#","").trim());
  if(h){document.getElementById("q").value=h;bus(h);}
}
window.addEventListener("hashchange",function(){var h=decodeURIComponent(location.hash.replace("#","").trim());document.getElementById("q").value=h;bus(h);});
window.addEventListener("load",init);
