<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Existencias - Pisos y Azulejos Acosta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f0f0f0;min-height:100vh;padding:18px 14px;display:flex;flex-direction:column;align-items:center}
img.logo{max-width:200px;width:80%;margin-bottom:14px}
input.q{width:100%;max-width:460px;padding:13px 16px;border:2px solid #ddd;border-radius:10px;font-size:16px;outline:none;margin-bottom:14px;background:#fff}
input.q:focus{border-color:#E87722}
.card{background:#fff;border-radius:16px;padding:24px 20px;max-width:460px;width:100%;box-shadow:0 6px 28px rgba(0,0,0,.1);text-align:center}
.tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800}
.tag-p{background:#e3f0ff;color:#1565c0}.tag-m{background:#fce4ec;color:#c62828}
.tag-fmt{background:#fff3e0;color:#E87722}
.nom{font-size:16px;font-weight:800;color:#1a1a1a;margin-bottom:16px;line-height:1.4}
.bar{height:5px;background:linear-gradient(90deg,#E87722,#ffb870);border-radius:3px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:#f8f8f8;border-radius:10px;padding:12px 8px}
.stat .lbl{font-size:10px;color:#aaa;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.stat .val{font-size:26px;font-weight:900;color:#E87722;line-height:1}
.stat .uni{font-size:10px;color:#bbb;margin-top:2px}
.stat.precio-box .val{font-size:22px;color:#1a1a1a}
.fec{font-size:11px;color:#ccc;margin-top:4px}
.vacio{color:#ccc;font-size:15px;padding:10px 0;line-height:1.8}
</style>

}
